<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sales History - POS</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1e3a8a" />
  <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png" />

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/receipt.css" />
</head>
<body>
  <!-- Device authorization gate - the FIRST gate, in front of even the PIN
       lock. Confirms this specific gadget was authorized by the store owner
       (see devices.json + admin.html) before it ever shows the PIN screen. -->
  <div class="auth-overlay" id="device-overlay">
    <div class="auth-box">
      <h1>🔐 Device Authorization</h1>
      <p id="device-message">Checking this device...</p>
      <form id="device-form">
        <div class="field">
          <label for="device-code">Authorization code</label>
          <input type="text" id="device-code" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" required />
        </div>
        <p class="field-error" id="device-error" hidden></p>
        <button type="submit" class="btn btn--primary" style="width:100%;">Authorize This Device</button>
      </form>
    </div>
  </div>

  <!-- Authorization lock screen - covers the whole app until the correct PIN
       is entered. Not just hidden by CSS: js/auth.js also blocks the page's
       real data from loading until this resolves. -->
  <div class="auth-overlay" id="auth-overlay">
    <div class="auth-box">
      <h1>🔒 POS Locked</h1>
      <p id="auth-message">Checking...</p>
      <form id="auth-form">
        <div class="field">
          <label for="auth-pin">PIN</label>
          <input type="password" id="auth-pin" inputmode="numeric" autocomplete="off" required />
        </div>
        <div class="field" id="auth-confirm-field" hidden>
          <label for="auth-pin-confirm">Confirm PIN</label>
          <input type="password" id="auth-pin-confirm" inputmode="numeric" autocomplete="off" />
        </div>
        <p class="field-error" id="auth-error" hidden></p>
        <button type="submit" class="btn btn--primary" style="width:100%;">Unlock</button>
      </form>
      <button type="button" class="auth-forgot" id="auth-forgot-btn">Forgot PIN?</button>
    </div>
  </div>

  <nav class="app-nav" aria-label="Main navigation">
    <span class="app-nav__brand">POS</span>
    <a class="app-nav__link" href="index.html" data-i18n="nav.checkout">Checkout</a>
    <a class="app-nav__link" href="products.html" data-i18n="nav.products">Products</a>
    <a class="app-nav__link" href="history.html" aria-current="page" data-i18n="nav.history">History</a>
    <a class="app-nav__link" href="settings.html" data-i18n="nav.settings">Settings</a>
    <button type="button" class="app-nav__link" id="nav-lock-btn" data-i18n="nav.lock">🔒 Lock</button>
  </nav>

  <main class="page">
    <div style="display:flex; align-items:center; gap: var(--space-md); flex-wrap: wrap;">
      <h1 style="margin:0;" data-i18n="history.heading">Sales History</h1>
      <div style="display:flex; gap: var(--space-sm); margin-left:auto; flex-wrap: wrap;">
        <button type="button" class="btn" id="export-csv-btn" data-i18n="history.exportCsv">Export to Excel (CSV)</button>
        <button type="button" class="btn btn--danger" id="reset-history-btn" data-i18n="history.resetHistory">Reset History</button>
      </div>
    </div>

    <div style="display:flex; gap: var(--space-md); flex-wrap: wrap; margin: var(--space-md) 0 var(--space-lg);">
      <div class="card" style="flex:1; min-width: 160px;">
        <div class="text-muted" data-i18n="history.todaySales">Today's Sales</div>
        <div style="font-size: var(--font-size-xl); font-weight:700;" id="today-count">0</div>
      </div>
      <div class="card" style="flex:1; min-width: 160px;">
        <div class="text-muted" data-i18n="history.todayTotal">Today's Total</div>
        <div style="font-size: var(--font-size-xl); font-weight:700;" id="today-total">RM 0.00</div>
      </div>
    </div>

    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>Date &amp; Time</th>
            <th>Receipt #</th>
            <th class="text-right">Items</th>
            <th class="text-right">Total</th>
            <th>Payment</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="sales-table-body"></tbody>
      </table>
      <p class="empty-state" id="sales-empty" hidden>No sales recorded yet.</p>
    </div>
  </main>

  <!-- Sale detail / reprint modal -->
  <div class="modal-overlay" id="sale-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="sale-modal-title">
      <h2 id="sale-modal-title" class="visually-hidden">Sale Receipt</h2>
      <div id="receipt-container"></div>
      <div class="modal__actions">
        <button type="button" class="btn" id="close-sale-btn">Close</button>
        <button type="button" class="btn btn--primary" id="print-sale-btn">Print</button>
      </div>
    </div>
  </div>

  <!-- Reset History confirmation modal - protected by its own separate
       password (not the staff PIN or Master PIN), since permanently
       deleting all sales records is a big, one-way action. -->
  <div class="modal-overlay" id="reset-history-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="reset-history-title">
      <h2 id="reset-history-title">Reset Sales History</h2>
      <p id="reset-history-message">Checking...</p>
      <form id="reset-history-form">
        <div class="field">
          <label for="reset-history-pin">Reset password</label>
          <input type="password" id="reset-history-pin" autocomplete="off" required />
        </div>
        <div class="field" id="reset-history-confirm-field" hidden>
          <label for="reset-history-pin-confirm">Confirm reset password</label>
          <input type="password" id="reset-history-pin-confirm" autocomplete="off" />
        </div>
        <p class="field-error" id="reset-history-error" hidden></p>
        <div class="modal__actions">
          <button type="button" class="btn" id="cancel-reset-history-btn">Cancel</button>
          <button type="submit" class="btn btn--danger">Delete All History</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast" role="status" hidden></div>

  <script type="module" src="js/sw-register.js"></script>
  <script type="module" src="js/history.js"></script>
</body>
</html>
