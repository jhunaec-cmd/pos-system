<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- App icon: a payment-terminal glyph on a deep navy rounded square -
       reads as "point of sale" at a glance and stays legible at small
       sizes. Built only from rects/circles (no complex paths) so it
       rasterizes cleanly to PNG for platforms that need one. -->
  <rect width="512" height="512" rx="96" fill="#1e3a8a" />

  <!-- Terminal body -->
  <rect x="156" y="96" width="200" height="320" rx="24" fill="#ffffff" />

  <!-- Screen -->
  <rect x="184" y="130" width="144" height="96" rx="10" fill="#2563eb" />
  <rect x="200" y="152" width="80" height="10" rx="5" fill="#ffffff" opacity="0.9" />
  <rect x="200" y="172" width="112" height="10" rx="5" fill="#ffffff" opacity="0.6" />

  <!-- Keypad -->
  <circle cx="204" cy="260" r="14" fill="#93c5fd" />
  <circle cx="256" cy="260" r="14" fill="#93c5fd" />
  <circle cx="308" cy="260" r="14" fill="#93c5fd" />
  <circle cx="204" cy="300" r="14" fill="#93c5fd" />
  <circle cx="256" cy="300" r="14" fill="#93c5fd" />
  <circle cx="308" cy="300" r="14" fill="#93c5fd" />

  <!-- Card slot -->
  <rect x="184" y="356" width="144" height="20" rx="10" fill="#1e3a8a" />
</svg>
